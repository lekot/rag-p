name: Production e2e smoke (Playwright)

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "Web base URL (default: https://lekottt.ru)"
        required: false
        default: "https://lekottt.ru"
      api_url:
        description: "API base URL (default: https://api.lekottt.ru)"
        required: false
        default: "https://api.lekottt.ru"

jobs:
  e2e-smoke:
    name: Playwright smoke tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install e2e dependencies
        working-directory: tests/e2e
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        working-directory: tests/e2e
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Playwright smoke tests
        working-directory: tests/e2e
        env:
          E2E_BASE_URL: ${{ github.event.inputs.base_url || 'https://lekottt.ru' }}
          E2E_API_URL: ${{ github.event.inputs.api_url || 'https://api.lekottt.ru' }}
          CI: "true"
        run: pnpm exec playwright test --config=playwright.config.ts

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/e2e/playwright-report/
          retention-days: 14

      - name: Upload Playwright traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: tests/e2e/test-results/
          retention-days: 7
