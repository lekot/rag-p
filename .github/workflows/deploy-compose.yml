name: Deploy to Compose production

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-compose
  cancel-in-progress: true

env:
  COMPOSE_DIR: /opt/rag-p

jobs:
  deploy:
    name: Build + deploy on host
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    # Self-hosted runner lives on the same host as the prod compose stack.
    # Builds images directly into the local docker daemon (no GHCR push) and
    # restarts the stack via `sudo -u ragp-deploy` so we never need to ssh
    # back into ourselves.
    runs-on: [self-hosted, deploy]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Compute image tag
        id: tag
        run: |
          SHA="${{ github.event.workflow_run.head_sha || github.sha }}"
          echo "value=sha-${SHA:0:12}" >> "$GITHUB_OUTPUT"

      - name: Build api image
        run: |
          set -euo pipefail
          docker build \
            -f apps/api/Dockerfile \
            -t rag-p-api:${{ steps.tag.outputs.value }} \
            -t rag-p-api:latest \
            apps/api

      - name: Build web image
        run: |
          set -euo pipefail
          docker build \
            -f apps/web/Dockerfile \
            -t rag-p-web:${{ steps.tag.outputs.value }} \
            -t rag-p-web:latest \
            apps/web

      - name: Provision compose bundle
        run: |
          set -euo pipefail
          # Stage everything into a workspace dir owned by gha-runner, then
          # hand it over to ragp-deploy via sudo cp/mv (gha-runner has no
          # write access to /opt/rag-p — keeps prod isolated from CI work).
          STAGE="$(mktemp -d)"
          cp deploy/compose/compose.prod.yml "$STAGE/compose.prod.yml"
          cp deploy/compose/Caddyfile "$STAGE/Caddyfile"
          mkdir -p "$STAGE/postgres/initdb" "$STAGE/cohere-egress" "$STAGE/postgres-backup"
          cp deploy/compose/postgres/initdb/001-extensions.sql "$STAGE/postgres/initdb/001-extensions.sql"
          cp deploy/compose/cohere-egress/Dockerfile     "$STAGE/cohere-egress/Dockerfile"
          cp deploy/compose/cohere-egress/entrypoint.sh  "$STAGE/cohere-egress/entrypoint.sh"
          cp deploy/compose/cohere-egress/tinyproxy.conf "$STAGE/cohere-egress/tinyproxy.conf"
          cp deploy/compose/postgres-backup/Dockerfile  "$STAGE/postgres-backup/Dockerfile"
          cp deploy/compose/postgres-backup/backup.sh   "$STAGE/postgres-backup/backup.sh"
          cp deploy/compose/postgres-backup/restore.sh  "$STAGE/postgres-backup/restore.sh"
          # Atomic-ish handover.
          sudo -u ragp-deploy mkdir -p "$COMPOSE_DIR/postgres/initdb" "$COMPOSE_DIR/cohere-egress" "$COMPOSE_DIR/postgres-backup"
          sudo -u ragp-deploy cp "$STAGE/compose.prod.yml" "$COMPOSE_DIR/compose.prod.yml"
          sudo -u ragp-deploy cp "$STAGE/Caddyfile"        "$COMPOSE_DIR/Caddyfile"
          sudo -u ragp-deploy cp "$STAGE/postgres/initdb/001-extensions.sql" "$COMPOSE_DIR/postgres/initdb/001-extensions.sql"
          for f in Dockerfile entrypoint.sh tinyproxy.conf; do
            sudo -u ragp-deploy cp "$STAGE/cohere-egress/$f" "$COMPOSE_DIR/cohere-egress/$f"
          done
          for f in Dockerfile backup.sh restore.sh; do
            sudo -u ragp-deploy cp "$STAGE/postgres-backup/$f" "$COMPOSE_DIR/postgres-backup/$f"
          done
          rm -rf "$STAGE"

      - name: Provision cohere AmneziaWG conf
        env:
          COHERE_AMNEZIA_CONF: ${{ secrets.COHERE_AMNEZIA_CONF }}
        run: |
          set -euo pipefail
          if [ -z "${COHERE_AMNEZIA_CONF:-}" ]; then
            echo "COHERE_AMNEZIA_CONF secret not set; cohere-egress will run without VPN"
            sudo -u ragp-deploy rm -rf "$COMPOSE_DIR/cohere.amnezia.conf" || true
            exit 0
          fi
          STAGE_FILE="$(mktemp)"
          umask 077
          printf '%s\n' "$COHERE_AMNEZIA_CONF" > "$STAGE_FILE"
          # docker-compose can leave a stale *directory* at this path if the
          # secret was previously empty; rm -rf catches both file + dir.
          sudo -u ragp-deploy rm -rf "$COMPOSE_DIR/cohere.amnezia.conf"
          sudo -u ragp-deploy cp "$STAGE_FILE" "$COMPOSE_DIR/cohere.amnezia.conf"
          sudo -u ragp-deploy chmod 600 "$COMPOSE_DIR/cohere.amnezia.conf"
          rm -f "$STAGE_FILE"

      - name: Write remote env
        env:
          POSTGRES_PASSWORD: ${{ secrets.COMPOSE_POSTGRES_PASSWORD }}
          RAGP_SESSION_SECRET: ${{ secrets.RAGP_SESSION_SECRET }}
          RAGP_SECRET_KEY: ${{ secrets.RAGP_SECRET_KEY }}
          RAGP_YOOKASSA_SHOP_ID: ${{ secrets.RAGP_YOOKASSA_SHOP_ID }}
          RAGP_YOOKASSA_SECRET_KEY: ${{ secrets.RAGP_YOOKASSA_SECRET_KEY }}
          RAGP_YOOKASSA_WEBHOOK_SECRET: ${{ secrets.RAGP_YOOKASSA_WEBHOOK_SECRET }}
          RAGP_YOOKASSA_INN: ${{ secrets.RAGP_YOOKASSA_INN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          COHERE_API_KEY: ${{ secrets.COHERE_API_KEY }}
          RAGP_S3_ENDPOINT_URL: ${{ vars.RAGP_S3_ENDPOINT_URL || 'https://s3.ru-1.storage.selcloud.ru' }}
          RAGP_S3_REGION: ${{ vars.RAGP_S3_REGION || 'ru-1' }}
          RAGP_S3_BUCKET: ${{ vars.RAGP_S3_BUCKET }}
          RAGP_S3_ACCESS_KEY_ID: ${{ secrets.RAGP_S3_ACCESS_KEY_ID }}
          RAGP_S3_SECRET_ACCESS_KEY: ${{ secrets.RAGP_S3_SECRET_ACCESS_KEY }}
          RAGP_S3_SERVICE_USER: ${{ vars.RAGP_S3_SERVICE_USER }}
          RAGP_S3_SERVICE_PASSWORD: ${{ secrets.RAGP_S3_SERVICE_PASSWORD }}
          RAGP_COHERE_HTTP_PROXY: ${{ vars.RAGP_COHERE_HTTP_PROXY || 'http://cohere-egress:8888' }}
          RAGP_API_IMAGE: rag-p-api:${{ steps.tag.outputs.value }}
          RAGP_WEB_IMAGE: rag-p-web:${{ steps.tag.outputs.value }}
        run: |
          set -euo pipefail
          umask 077
          STAGE_ENV="$(mktemp)"
          cat > "$STAGE_ENV" <<EOF
          POSTGRES_DB=ragp
          POSTGRES_USER=ragp
          POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
          RAGP_API_IMAGE=${RAGP_API_IMAGE}
          RAGP_WEB_IMAGE=${RAGP_WEB_IMAGE}
          NEXT_PUBLIC_API_URL=https://api.lekottt.ru
          CADDY_ACME_EMAIL=papanifontov@gmail.com
          OLLAMA_MODEL=bge-m3
          RAGP_SESSION_SECRET=${RAGP_SESSION_SECRET}
          RAGP_SECRET_KEY=${RAGP_SECRET_KEY}
          RAGP_DEBUG=false
          RAGP_ENFORCE_SUBSCRIPTION_QUOTAS=true
          RAGP_LLM_FALLBACK_MODE=extractive
          RAGP_YOOKASSA_SHOP_ID=${RAGP_YOOKASSA_SHOP_ID}
          RAGP_YOOKASSA_SECRET_KEY=${RAGP_YOOKASSA_SECRET_KEY}
          RAGP_YOOKASSA_WEBHOOK_SECRET=${RAGP_YOOKASSA_WEBHOOK_SECRET}
          RAGP_YOOKASSA_RETURN_URL=https://lekottt.ru/account/billing
          RAGP_YOOKASSA_TEST_MODE=false
          RAGP_YOOKASSA_TAXATION_SYSTEM=6
          RAGP_YOOKASSA_INN=${RAGP_YOOKASSA_INN}
          OPENAI_API_KEY=${OPENAI_API_KEY}
          ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
          COHERE_API_KEY=${COHERE_API_KEY}
          RAGP_S3_ENDPOINT_URL=${RAGP_S3_ENDPOINT_URL}
          RAGP_S3_REGION=${RAGP_S3_REGION}
          RAGP_S3_BUCKET=${RAGP_S3_BUCKET}
          RAGP_S3_ACCESS_KEY_ID=${RAGP_S3_ACCESS_KEY_ID}
          RAGP_S3_SECRET_ACCESS_KEY=${RAGP_S3_SECRET_ACCESS_KEY}
          RAGP_S3_SERVICE_USER=${RAGP_S3_SERVICE_USER}
          RAGP_S3_SERVICE_PASSWORD=${RAGP_S3_SERVICE_PASSWORD}
          RAGP_COHERE_HTTP_PROXY=${RAGP_COHERE_HTTP_PROXY}
          EOF
          sed -i 's/^          //' "$STAGE_ENV"
          sudo -u ragp-deploy cp "$STAGE_ENV" "$COMPOSE_DIR/.env"
          sudo -u ragp-deploy chmod 600 "$COMPOSE_DIR/.env"
          rm -f "$STAGE_ENV"

      - name: Build local-only images & migrate
        run: |
          set -euo pipefail
          sudo -u ragp-deploy bash <<EOF
            set -euo pipefail
            cd "$COMPOSE_DIR"
            # Build sidecar + backup runner (not on GHCR).
            docker compose -f compose.prod.yml --env-file .env build cohere-egress postgres-backup
            # Bring infra up first.
            docker compose -f compose.prod.yml --env-file .env up -d postgres redis ollama
            for svc in postgres:'pg_isready -U ragp -d ragp' redis:'redis-cli ping | grep -q PONG' ollama:'ollama list'; do
              name="\${svc%%:*}"
              cmd="\${svc#*:}"
              ready=0
              for i in \$(seq 1 60); do
                if docker compose -f compose.prod.yml --env-file .env exec -T "\$name" sh -lc "\$cmd"; then
                  ready=1; break
                fi
                sleep 2
              done
              if [ "\$ready" != 1 ]; then
                echo "::error::\$name did not become ready"; exit 1
              fi
            done
            docker compose -f compose.prod.yml --env-file .env exec -T ollama sh -lc 'ollama pull "\$OLLAMA_MODEL"'
            docker compose -f compose.prod.yml --env-file .env run --rm migrate
          EOF

      - name: Start app
        run: |
          set -euo pipefail
          sudo -u ragp-deploy bash <<EOF
            set -euo pipefail
            cd "$COMPOSE_DIR"
            docker compose -f compose.prod.yml --env-file .env up -d --remove-orphans
            docker compose -f compose.prod.yml --env-file .env ps
          EOF

      - name: Smoke test
        run: |
          set -euo pipefail
          retry_curl() {
            local output="$1"
            local url="$2"
            for i in $(seq 1 20); do
              if curl -fsS --max-time 20 "$url" -o "$output"; then
                return 0
              fi
              sleep 5
            done
            curl -fsS --max-time 20 "$url" -o "$output"
          }
          retry_curl /tmp/healthz.json https://api.lekottt.ru/healthz
          grep -q '"status":"ok"' /tmp/healthz.json
          retry_curl /tmp/signup.html https://lekottt.ru/signup
          css_path=$(grep -oE 'href="[^"]*/_next/static/css/[^"]+\.css"' /tmp/signup.html | head -1 | sed -E 's/^href="//;s/"$//')
          test -n "$css_path"
          case "$css_path" in
            http*) css_url="$css_path" ;;
            /*) css_url="https://lekottt.ru$css_path" ;;
            *) css_url="https://lekottt.ru/$css_path" ;;
          esac
          retry_curl /tmp/signup.css "$css_url"
          test -s /tmp/signup.css
