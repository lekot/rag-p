name: Deploy to Compose production

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-compose
  cancel-in-progress: true

env:
  COMPOSE_DIR: /opt/rag-p

jobs:
  deploy:
    name: Build + deploy on host
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && vars.DEPLOY_TARGET == 'compose') }}
    # Self-hosted runner lives on the same host as the prod compose stack.
    # Builds images directly into the local docker daemon (no GHCR push) and
    # restarts the stack via `sudo -u ragp-deploy` so we never need to ssh
    # back into ourselves.
    runs-on: [self-hosted, deploy]
    # Production environment is the scope for COMPOSE_*, RAGP_* and other
    # secrets used below — without this binding they all resolve to "" at
    # runtime and the .env we render is empty.
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Compute image tag
        id: tag
        run: |
          SHA="${{ github.event.workflow_run.head_sha || github.sha }}"
          echo "value=sha-${SHA:0:12}" >> "$GITHUB_OUTPUT"

      - name: Build api image
        run: |
          set -euo pipefail
          docker build \
            -f apps/api/Dockerfile \
            -t rag-p-api:${{ steps.tag.outputs.value }} \
            -t rag-p-api:latest \
            apps/api

      - name: Build web image
        run: |
          set -euo pipefail
          # Web Dockerfile expects pnpm-lock.yaml + pnpm-workspace.yaml at the
          # build-context root (pnpm workspace), so we build from the repo root.
          docker build \
            -f apps/web/Dockerfile \
            -t rag-p-web:${{ steps.tag.outputs.value }} \
            -t rag-p-web:latest \
            .

      - name: Provision compose bundle
        run: |
          set -euo pipefail
          # gha-runner's $HOME and mktemp dirs are mode 700 — ragp-deploy
          # can't read from them under sudo.  Pipe each file through `cat |
          # sudo tee` so the read happens as gha-runner (owner) and the
          # write happens as ragp-deploy.
          sudo -u ragp-deploy mkdir -p \
            "$COMPOSE_DIR/postgres/initdb" \
            "$COMPOSE_DIR/cohere-egress" \
            "$COMPOSE_DIR/postgres-backup"

          install_as_deploy() {
            local src="$1" dst="$2" mode="${3:-644}"
            cat "$src" | sudo -u ragp-deploy tee "$dst" >/dev/null
            sudo -u ragp-deploy chmod "$mode" "$dst"
          }

          install_as_deploy deploy/compose/compose.prod.yml "$COMPOSE_DIR/compose.prod.yml"
          install_as_deploy deploy/compose/Caddyfile        "$COMPOSE_DIR/Caddyfile"
          install_as_deploy deploy/compose/postgres/initdb/001-extensions.sql \
                            "$COMPOSE_DIR/postgres/initdb/001-extensions.sql"
          install_as_deploy deploy/compose/cohere-egress/Dockerfile     "$COMPOSE_DIR/cohere-egress/Dockerfile"
          install_as_deploy deploy/compose/cohere-egress/entrypoint.sh  "$COMPOSE_DIR/cohere-egress/entrypoint.sh" 755
          install_as_deploy deploy/compose/cohere-egress/tinyproxy.conf "$COMPOSE_DIR/cohere-egress/tinyproxy.conf"
          install_as_deploy deploy/compose/postgres-backup/Dockerfile   "$COMPOSE_DIR/postgres-backup/Dockerfile"
          install_as_deploy deploy/compose/postgres-backup/backup.sh    "$COMPOSE_DIR/postgres-backup/backup.sh"  755
          install_as_deploy deploy/compose/postgres-backup/restore.sh   "$COMPOSE_DIR/postgres-backup/restore.sh" 755

      - name: Provision cohere AmneziaWG conf
        env:
          COHERE_AMNEZIA_CONF: ${{ secrets.COHERE_AMNEZIA_CONF }}
        run: |
          set -euo pipefail
          if [ -z "${COHERE_AMNEZIA_CONF:-}" ]; then
            echo "COHERE_AMNEZIA_CONF secret not set; cohere-egress will run without VPN"
            sudo -u ragp-deploy rm -rf "$COMPOSE_DIR/cohere.amnezia.conf" || true
            exit 0
          fi
          # docker-compose can leave a stale *directory* at this path if the
          # secret was previously empty; rm -rf catches both file + dir.
          sudo -u ragp-deploy rm -rf "$COMPOSE_DIR/cohere.amnezia.conf"
          # Pipe through tee so the secret is never written to a file that
          # gha-runner owns (mode-700 home is unreadable by ragp-deploy anyway).
          printf '%s\n' "$COHERE_AMNEZIA_CONF" | sudo -u ragp-deploy tee "$COMPOSE_DIR/cohere.amnezia.conf" >/dev/null
          sudo -u ragp-deploy chmod 600 "$COMPOSE_DIR/cohere.amnezia.conf"

      - name: Write remote env
        env:
          POSTGRES_PASSWORD: ${{ secrets.COMPOSE_POSTGRES_PASSWORD }}
          RAGP_SESSION_SECRET: ${{ secrets.RAGP_SESSION_SECRET }}
          RAGP_SECRET_KEY: ${{ secrets.RAGP_SECRET_KEY }}
          RAGP_YOOKASSA_SHOP_ID: ${{ secrets.RAGP_YOOKASSA_SHOP_ID }}
          RAGP_YOOKASSA_SECRET_KEY: ${{ secrets.RAGP_YOOKASSA_SECRET_KEY }}
          RAGP_YOOKASSA_WEBHOOK_SECRET: ${{ secrets.RAGP_YOOKASSA_WEBHOOK_SECRET }}
          RAGP_YOOKASSA_INN: ${{ secrets.RAGP_YOOKASSA_INN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          COHERE_API_KEY: ${{ secrets.COHERE_API_KEY }}
          RAGP_S3_ENDPOINT_URL: ${{ vars.RAGP_S3_ENDPOINT_URL || 'https://s3.ru-1.storage.selcloud.ru' }}
          RAGP_S3_REGION: ${{ vars.RAGP_S3_REGION || 'ru-1' }}
          RAGP_S3_BUCKET: ${{ vars.RAGP_S3_BUCKET }}
          RAGP_S3_ACCESS_KEY_ID: ${{ secrets.RAGP_S3_ACCESS_KEY_ID }}
          RAGP_S3_SECRET_ACCESS_KEY: ${{ secrets.RAGP_S3_SECRET_ACCESS_KEY }}
          RAGP_S3_SERVICE_USER: ${{ vars.RAGP_S3_SERVICE_USER }}
          RAGP_S3_SERVICE_PASSWORD: ${{ secrets.RAGP_S3_SERVICE_PASSWORD }}
          # Postgres backup S3 destination — by default reuse the application
          # S3 bucket (objects are partitioned via RAGP_PGBACKUP_PREFIX so app
          # uploads and pg dumps cohabit safely).  Override the *_PGBACKUP_*
          # vars/secrets only if a dedicated bucket is provisioned.
          RAGP_PGBACKUP_S3_ENDPOINT_URL: ${{ vars.RAGP_PGBACKUP_S3_ENDPOINT_URL || vars.RAGP_S3_ENDPOINT_URL || 'https://s3.ru-1.storage.selcloud.ru' }}
          RAGP_PGBACKUP_S3_BUCKET: ${{ vars.RAGP_PGBACKUP_S3_BUCKET || vars.RAGP_S3_BUCKET }}
          RAGP_PGBACKUP_S3_ACCESS_KEY_ID: ${{ secrets.RAGP_PGBACKUP_S3_ACCESS_KEY_ID || secrets.RAGP_S3_ACCESS_KEY_ID }}
          RAGP_PGBACKUP_S3_SECRET_ACCESS_KEY: ${{ secrets.RAGP_PGBACKUP_S3_SECRET_ACCESS_KEY || secrets.RAGP_S3_SECRET_ACCESS_KEY }}
          RAGP_PGBACKUP_S3_REGION: ${{ vars.RAGP_PGBACKUP_S3_REGION || vars.RAGP_S3_REGION || 'ru-1' }}
          RAGP_PGBACKUP_PREFIX: ${{ vars.RAGP_PGBACKUP_PREFIX || 'pg-backups/' }}
          RAGP_COHERE_HTTP_PROXY: ${{ vars.RAGP_COHERE_HTTP_PROXY || 'http://cohere-egress:8888' }}
          # SMTP defaults route through Selectel SMTP relay. User/password are
          # required secrets because the managed relay does not accept anonymous SMTP.
          RAGP_SMTP_HOST: ${{ secrets.RAGP_SMTP_HOST || 'smtp.mail.selcloud.ru' }}
          RAGP_SMTP_PORT: ${{ vars.RAGP_SMTP_PORT || '1127' }}
          RAGP_SMTP_USER: ${{ secrets.RAGP_SMTP_USER }}
          RAGP_SMTP_PASSWORD: ${{ secrets.RAGP_SMTP_PASSWORD }}
          RAGP_SMTP_FROM: ${{ secrets.RAGP_SMTP_FROM || 'noreply@lekottt.ru' }}
          RAGP_SMTP_USE_TLS: ${{ vars.RAGP_SMTP_USE_TLS || 'true' }}
          RAGP_PASSWORD_RESET_TOKEN_TTL_MINUTES: ${{ vars.RAGP_PASSWORD_RESET_TOKEN_TTL_MINUTES || '60' }}
          RAGP_API_IMAGE: rag-p-api:${{ steps.tag.outputs.value }}
          RAGP_WEB_IMAGE: rag-p-web:${{ steps.tag.outputs.value }}
        run: |
          set -euo pipefail
          if [ "${RAGP_SMTP_HOST}" = "smtp.mail.selcloud.ru" ] && { [ -z "${RAGP_SMTP_USER}" ] || [ -z "${RAGP_SMTP_PASSWORD}" ]; }; then
            echo "::error::RAGP_SMTP_USER and RAGP_SMTP_PASSWORD are required for Selectel SMTP relay"
            exit 1
          fi
          umask 077
          ENV_BODY=$(cat <<EOF
          POSTGRES_DB=ragp
          POSTGRES_USER=ragp
          POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
          RAGP_API_IMAGE=${RAGP_API_IMAGE}
          RAGP_WEB_IMAGE=${RAGP_WEB_IMAGE}
          NEXT_PUBLIC_API_URL=https://api.lekottt.ru
          CADDY_ACME_EMAIL=papanifontov@gmail.com
          OLLAMA_MODEL=bge-m3
          RAGP_SESSION_SECRET=${RAGP_SESSION_SECRET}
          RAGP_SECRET_KEY=${RAGP_SECRET_KEY}
          RAGP_DEBUG=false
          RAGP_ENFORCE_SUBSCRIPTION_QUOTAS=true
          RAGP_LLM_FALLBACK_MODE=extractive
          RAGP_YOOKASSA_SHOP_ID=${RAGP_YOOKASSA_SHOP_ID}
          RAGP_YOOKASSA_SECRET_KEY=${RAGP_YOOKASSA_SECRET_KEY}
          RAGP_YOOKASSA_WEBHOOK_SECRET=${RAGP_YOOKASSA_WEBHOOK_SECRET}
          RAGP_YOOKASSA_RETURN_URL=https://lekottt.ru/account/billing
          RAGP_YOOKASSA_TEST_MODE=false
          RAGP_YOOKASSA_TAXATION_SYSTEM=6
          RAGP_YOOKASSA_INN=${RAGP_YOOKASSA_INN}
          OPENAI_API_KEY=${OPENAI_API_KEY}
          RAGP_DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
          DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
          ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
          COHERE_API_KEY=${COHERE_API_KEY}
          RAGP_S3_ENDPOINT_URL=${RAGP_S3_ENDPOINT_URL}
          RAGP_S3_REGION=${RAGP_S3_REGION}
          RAGP_S3_BUCKET=${RAGP_S3_BUCKET}
          RAGP_S3_ACCESS_KEY_ID=${RAGP_S3_ACCESS_KEY_ID}
          RAGP_S3_SECRET_ACCESS_KEY=${RAGP_S3_SECRET_ACCESS_KEY}
          RAGP_S3_SERVICE_USER=${RAGP_S3_SERVICE_USER}
          RAGP_S3_SERVICE_PASSWORD=${RAGP_S3_SERVICE_PASSWORD}
          RAGP_PGBACKUP_S3_ENDPOINT_URL=${RAGP_PGBACKUP_S3_ENDPOINT_URL}
          RAGP_PGBACKUP_S3_BUCKET=${RAGP_PGBACKUP_S3_BUCKET}
          RAGP_PGBACKUP_S3_ACCESS_KEY_ID=${RAGP_PGBACKUP_S3_ACCESS_KEY_ID}
          RAGP_PGBACKUP_S3_SECRET_ACCESS_KEY=${RAGP_PGBACKUP_S3_SECRET_ACCESS_KEY}
          RAGP_PGBACKUP_S3_REGION=${RAGP_PGBACKUP_S3_REGION}
          RAGP_PGBACKUP_PREFIX=${RAGP_PGBACKUP_PREFIX}
          RAGP_COHERE_HTTP_PROXY=${RAGP_COHERE_HTTP_PROXY}
          RAGP_SMTP_HOST=${RAGP_SMTP_HOST}
          RAGP_SMTP_PORT=${RAGP_SMTP_PORT}
          RAGP_SMTP_USER=${RAGP_SMTP_USER}
          RAGP_SMTP_PASSWORD=${RAGP_SMTP_PASSWORD}
          RAGP_SMTP_FROM=${RAGP_SMTP_FROM}
          RAGP_SMTP_USE_TLS=${RAGP_SMTP_USE_TLS}
          RAGP_PASSWORD_RESET_TOKEN_TTL_MINUTES=${RAGP_PASSWORD_RESET_TOKEN_TTL_MINUTES}
          EOF
          )
          # Strip the YAML-imposed leading indent and write through tee so the
          # secret-laden .env never sits in a gha-runner-owned file.
          printf '%s\n' "$ENV_BODY" | sed 's/^          //' | sudo -u ragp-deploy tee "$COMPOSE_DIR/.env" >/dev/null
          sudo -u ragp-deploy chmod 600 "$COMPOSE_DIR/.env"

      - name: Build local-only images & migrate
        run: |
          set -euo pipefail
          sudo -u ragp-deploy bash <<EOF
            set -euo pipefail
            cd "$COMPOSE_DIR"
            # Build sidecar + backup runner (not on GHCR).
            docker compose -f compose.prod.yml --env-file .env build cohere-egress postgres-backup
            # Bring infra up first.
            docker compose -f compose.prod.yml --env-file .env up -d postgres redis ollama
            for svc in postgres:'pg_isready -U ragp -d ragp' redis:'redis-cli ping | grep -q PONG' ollama:'ollama list'; do
              name="\${svc%%:*}"
              cmd="\${svc#*:}"
              ready=0
              for i in \$(seq 1 60); do
                if docker compose -f compose.prod.yml --env-file .env exec -T "\$name" sh -lc "\$cmd"; then
                  ready=1; break
                fi
                sleep 2
              done
              if [ "\$ready" != 1 ]; then
                echo "::error::\$name did not become ready"; exit 1
              fi
            done
            docker compose -f compose.prod.yml --env-file .env exec -T ollama sh -lc 'ollama pull "\$OLLAMA_MODEL"'
            docker compose -f compose.prod.yml --env-file .env run --rm migrate
          EOF

      - name: Start app
        run: |
          set -euo pipefail
          sudo -u ragp-deploy bash <<EOF
            set -euo pipefail
            cd "$COMPOSE_DIR"
            docker compose -f compose.prod.yml --env-file .env up -d --remove-orphans
            docker compose -f compose.prod.yml --env-file .env ps
          EOF

      - name: Smoke test
        run: |
          set -euo pipefail
          retry_curl() {
            local output="$1"
            local url="$2"
            for i in $(seq 1 20); do
              if curl -fsS --max-time 20 "$url" -o "$output"; then
                return 0
              fi
              sleep 5
            done
            curl -fsS --max-time 20 "$url" -o "$output"
          }
          retry_curl /tmp/healthz.json https://api.lekottt.ru/healthz
          grep -q '"status":"ok"' /tmp/healthz.json
          retry_curl /tmp/signup.html https://lekottt.ru/signup
          css_path=$(grep -oE 'href="[^"]*/_next/static/css/[^"]+\.css"' /tmp/signup.html | head -1 | sed -E 's/^href="//;s/"$//')
          test -n "$css_path"
          case "$css_path" in
            http*) css_url="$css_path" ;;
            /*) css_url="https://lekottt.ru$css_path" ;;
            *) css_url="https://lekottt.ru/$css_path" ;;
          esac
          retry_curl /tmp/signup.css "$css_url"
          test -s /tmp/signup.css

      - name: Prune stale docker artefacts
        # Always run, even if smoke fails — disk pressure persists across
        # runs and the CI pipeline starts breaking with "no space left on
        # device" once images / build cache pile up past ~85%.
        if: always()
        run: |
          set -euo pipefail
          # Drop dangling layers, untagged builds and old build cache.
          # Safe with -a -f because rag-p-{api,web}:latest are still in use
          # by running containers — docker won't reclaim those.
          sudo -u ragp-deploy docker image prune -a -f >/dev/null 2>&1 || true
          sudo -u ragp-deploy docker builder prune -a -f >/dev/null 2>&1 || true
          sudo -u ragp-deploy docker container prune -f >/dev/null 2>&1 || true
          # Anonymous (sha-named) volumes left behind by docker compose
          # restarts can pile up to ~10 GB.  `volume prune` (without -a) only
          # touches dangling volumes — named volumes attached to running
          # services (postgres, ollama, redis) are kept.
          sudo -u ragp-deploy docker volume prune -f >/dev/null 2>&1 || true
          df -h / | tail -1
