name: Deploy to staging

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/lekot

jobs:
  build-api:
    name: Build api image
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      tag: ${{ steps.tag.outputs.value }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Compute tag
        id: tag
        run: |
          SHA="${{ github.event.workflow_run.head_sha || github.sha }}"
          echo "value=sha-${SHA:0:12}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push api
        uses: docker/build-push-action@v5
        with:
          context: apps/api
          push: true
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max
          tags: |
            ${{ env.IMAGE_PREFIX }}/rag-p-api:${{ steps.tag.outputs.value }}
            ${{ env.IMAGE_PREFIX }}/rag-p-api:staging-latest

  build-web:
    name: Build web image
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      tag: ${{ steps.tag.outputs.value }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Compute tag
        id: tag
        run: |
          SHA="${{ github.event.workflow_run.head_sha || github.sha }}"
          echo "value=sha-${SHA:0:12}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push web
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          cache-from: type=gha,scope=web
          cache-to: type=gha,scope=web,mode=max
          build-args: |
            NEXT_PUBLIC_API_URL=https://api.lekottt.ru
            NEXT_PUBLIC_ORG_ID=00000000-0000-0000-0000-000000000001
          tags: |
            ${{ env.IMAGE_PREFIX }}/rag-p-web:${{ steps.tag.outputs.value }}
            ${{ env.IMAGE_PREFIX }}/rag-p-web:staging-latest

  deploy:
    name: Deploy to Selectel staging
    needs: [build-api, build-web]
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.3

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.33.7

      - name: Write kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBECONFIG_STAGING }}" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Pre-deploy info
        run: |
          kubectl -n rag-p get pods
          helm -n rag-p history rag-p | tail -5 || true

      - name: Helm dependency build
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo add grafana https://grafana.github.io/helm-charts
          helm repo add external-secrets https://charts.external-secrets.io
          helm repo update
          helm dependency build ./charts/rag-p

      - name: Install/upgrade cluster prerequisites (kube-prometheus-stack + ESO)
        run: |
          helm upgrade --install kube-prometheus-stack \
            prometheus-community/kube-prometheus-stack \
            -n monitoring --create-namespace \
            --version 65.5.1 \
            --set crds.enabled=true \
            --set grafana.enabled=true \
            --set prometheus.prometheusSpec.serviceMonitorSelectorNilUsesHelmValues=false \
            --set prometheus.prometheusSpec.serviceMonitorNamespaceSelector={} \
            --wait --timeout 10m

          helm upgrade --install external-secrets \
            external-secrets/external-secrets \
            -n external-secrets --create-namespace \
            --version 0.10.4 \
            --set installCRDs=true \
            --wait --timeout 5m

      - name: Helm upgrade
        id: upgrade
        run: |
          helm upgrade rag-p ./charts/rag-p \
            -n rag-p \
            -f charts/rag-p/values.staging.yaml \
            --set api.image.tag=${{ needs.build-api.outputs.tag }} \
            --set web.image.tag=${{ needs.build-web.outputs.tag }} \
            --wait \
            --timeout 6m

      - name: Wait for rollouts
        run: |
          kubectl -n rag-p rollout status deploy/rag-p-api --timeout=180s
          kubectl -n rag-p rollout status deploy/rag-p-web --timeout=180s

      - name: Smoke test
        run: |
          set -e
          echo "API healthz:"
          curl -fsS --max-time 15 https://api.lekottt.ru/healthz
          echo
          echo "Web root (status only):"
          status=$(curl -s -o /tmp/web.html -w "%{http_code}" --max-time 15 https://lekottt.ru/)
          echo "HTTP $status"
          if [ "$status" -ge 500 ]; then
            echo "Web returned 5xx — failing smoke"
            head -50 /tmp/web.html
            exit 1
          fi
          if grep -q "Element type is invalid" /tmp/web.html; then
            echo "Runtime error detected in HTML"
            exit 1
          fi

      - name: Rollback on failure
        if: failure() && steps.upgrade.outcome == 'success'
        run: |
          echo "Smoke/rollout failed — rolling back"
          helm -n rag-p rollback rag-p
          kubectl -n rag-p get pods

      - name: Helm release status on failure
        if: failure() && steps.upgrade.outcome != 'success'
        run: |
          echo "Helm upgrade itself failed — leaving release as-is for inspection"
          helm -n rag-p history rag-p | tail -10
          kubectl -n rag-p get pods
