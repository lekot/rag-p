name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-py:
    name: Python lint + typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-packages

      - name: ruff format check
        run: uvx ruff format --check apps/api

      - name: ruff lint
        run: uvx ruff check apps/api

      - name: mypy
        run: uvx --with-editable apps/api mypy apps/api/src

  build-web-smoke:
    name: Web build smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Next build (gate)
        working-directory: apps/web
        run: pnpm run build

  helm-lint:
    name: Helm lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: helm lint
        run: helm lint charts/rag-p
