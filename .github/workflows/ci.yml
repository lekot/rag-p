name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-py:
    name: Python lint + typecheck + pytest
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: ragp
          POSTGRES_PASSWORD: ragp
          POSTGRES_DB: ragp_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ragp"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-packages --all-extras

      - name: ruff format check
        run: uvx ruff@0.6.9 format --check apps/api

      - name: ruff lint
        run: uvx ruff@0.6.9 check apps/api

      - name: mypy
        run: uvx --with-editable apps/api --with types-jsonschema mypy@1.10 apps/api/src

      - name: pytest
        env:
          TEST_DATABASE_URL: postgresql+asyncpg://ragp:ragp@localhost:5432/ragp_test
        run: |
          cd apps/api
          uv run pytest tests/ -x --tb=short

  lint-typecheck-web:
    name: Web lint + typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: ESLint
        working-directory: apps/web
        run: pnpm run lint

      - name: TypeScript typecheck
        working-directory: apps/web
        run: pnpm run typecheck

  helm-lint:
    name: Helm lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: helm lint
        run: |
          helm lint charts/rag-p
          helm lint charts/rag-p-runtime
