name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-py:
    name: Python lint + typecheck + pytest
    runs-on: [self-hosted, ci]
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: ragp
          POSTGRES_PASSWORD: ragp
          POSTGRES_DB: ragp_test
        ports:
          # Map container :5432 to a random host port so two parallel jobs
          # on the same self-hosted runner box don't fight over 5432.
          - "5432"
        options: >-
          --health-cmd "pg_isready -U ragp"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          # Two self-hosted runners share the host filesystem; share the uv
          # download cache too so torch/scipy don't get stashed twice and
          # the disk fills up.  setup-uv writes UV_CACHE_DIR for downstream
          # steps automatically when cache-local-path is set.  We don't pass
          # enable-cache: true because the action's cache-restore step
          # requires uv.lock (we don't have one — the project uses
          # pyproject-only resolution).
          cache-local-path: /var/cache/uv

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-packages --all-extras

      - name: ruff format check
        run: uvx ruff@0.6.9 format --check apps/api

      - name: ruff lint
        run: uvx ruff@0.6.9 check apps/api

      - name: mypy
        run: uvx --with-editable apps/api --with types-jsonschema mypy@1.10 apps/api/src

      - name: pytest
        env:
          # Resolve the dynamically-mapped host port at runtime.
          TEST_DATABASE_URL: postgresql+asyncpg://ragp:ragp@localhost:${{ job.services.postgres.ports['5432'] }}/ragp_test
        run: |
          cd apps/api
          uv run pytest tests/ -x --tb=short

      - name: Reclaim workspace disk
        # Self-hosted runner: \`actions/checkout\` only clears tracked paths.
        # \`uv sync\` lays down a 5+ GB \`.venv\` (torch, scipy,
        # sentence-transformers) and \`mypy --strict\` warms a 400 MB
        # \`.mypy_cache\` which both linger between runs and fill the disk.
        if: always()
        run: |
          rm -rf .venv apps/api/.venv apps/api/.mypy_cache .mypy_cache

  lint-typecheck-web:
    name: Web lint + typecheck
    runs-on: [self-hosted, ci]
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: ESLint
        working-directory: apps/web
        run: pnpm run lint

      - name: TypeScript typecheck
        working-directory: apps/web
        run: pnpm run typecheck
