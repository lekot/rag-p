[tool.uv.workspace]
members = ["apps/api"]

[tool.uv]
python = "3.12"

[tool.ruff]
target-version = "py312"
line-length = 100
src = ["apps/api/src"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM", "ANN"]
ignore = ["ANN101", "ANN102"]

[tool.ruff.lint.isort]
known-first-party = ["rag_p"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.mypy]
python_version = "3.12"
strict = true
pretty = true
show_error_codes = true
ignore_missing_imports = false
warn_return_any = true
warn_unused_configs = true
