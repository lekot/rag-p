[tool.uv.workspace]
members = ["apps/api"]

[tool.uv]
required-version = "3.12"

[tool.ruff]
target-version = "py312"
line-length = 100
src = ["apps/api/src"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]
ignore = ["B008"]  # FastAPI Depends/Query/Body in defaults

[tool.ruff.lint.per-file-ignores]
"apps/api/alembic/versions/*.py" = ["E501"]

[tool.ruff.lint.isort]
known-first-party = ["rag_p"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.mypy]
python_version = "3.12"
strict = true
pretty = true
show_error_codes = true
ignore_missing_imports = false
warn_return_any = true
warn_unused_configs = true

[[tool.mypy.overrides]]
# pgvector has no py.typed marker or stubs; Vector is used only in column definitions
module = "pgvector.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
# litellm has no py.typed marker; return types are dynamic wrappers
module = "litellm"
ignore_missing_imports = true

[[tool.mypy.overrides]]
# cohere SDK ships stubs in some versions but not consistently across v5
module = "cohere"
ignore_missing_imports = true

[[tool.mypy.overrides]]
# langfuse has no py.typed marker
module = "langfuse"
ignore_missing_imports = true

[[tool.mypy.overrides]]
# langchain text splitters have no py.typed marker
module = "langchain_text_splitters"
ignore_missing_imports = true

[[tool.mypy.overrides]]
# ragas and datasets have no py.typed marker
module = ["ragas", "ragas.*", "datasets"]
ignore_missing_imports = true

[[tool.mypy.overrides]]
# pypdf has no py.typed marker
module = ["pypdf", "pypdf.*"]
ignore_missing_imports = true

[[tool.mypy.overrides]]
# python-docx imports as "docx"; no py.typed marker
module = ["docx", "docx.*"]
ignore_missing_imports = true

[[tool.mypy.overrides]]
# fakeredis is a dev-only test dependency; no py.typed marker
module = ["fakeredis", "fakeredis.*"]
ignore_missing_imports = true

