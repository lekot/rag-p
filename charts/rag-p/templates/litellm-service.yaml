{{- if .Values.litellm.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "rag-p.fullname" . }}-litellm
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "rag-p.componentLabels" (dict "root" . "component" "litellm") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.litellm.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "rag-p.componentSelectorLabels" (dict "root" . "component" "litellm") | nindent 4 }}
{{- end }}
