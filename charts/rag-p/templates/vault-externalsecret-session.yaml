{{- if and .Values.vault.enabled .Values.vault.externalSecrets.session }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "rag-p.fullname" . }}-session-secret
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "rag-p.componentLabels" (dict "root" . "component" "api") | nindent 4 }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ include "rag-p.fullname" . }}-vault
    kind: ClusterSecretStore
  target:
    # Must match the secret name referenced in api-deployment.yaml (rag-p.fullname + "-api-secrets")
    name: {{ include "rag-p.fullname" . }}-api-secrets
    creationPolicy: Owner
  data:
    - secretKey: sessionSecret
      remoteRef:
        key: rag-p/session
        property: secret
{{- end }}
