{{- if .Values.postgres.cnpg.backup.enabled }}
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: {{ include "rag-p.fullname" . }}-postgres-daily
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "rag-p.componentLabels" (dict "root" . "component" "postgres") | nindent 4 }}
spec:
  schedule: {{ .Values.postgres.cnpg.backup.schedule | quote }}
  backupOwnerReference: self
  cluster:
    name: {{ include "rag-p.fullname" . }}-postgres
{{- end }}
