{{- if and .Values.vault.enabled .Values.vault.externalSecrets.llmKeys }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "rag-p.fullname" . }}-llm-keys
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "rag-p.componentLabels" (dict "root" . "component" "llm-keys") | nindent 4 }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ include "rag-p.fullname" . }}-vault
    kind: ClusterSecretStore
  target:
    name: {{ .Values.llmKeysSecret }}
    creationPolicy: Owner
  data:
    - secretKey: DEEPSEEK_API_KEY
      remoteRef:
        key: rag-p/llm
        property: deepseek_api_key
    - secretKey: OPENAI_API_KEY
      remoteRef:
        key: rag-p/llm
        property: openai_api_key
    - secretKey: ANTHROPIC_API_KEY
      remoteRef:
        key: rag-p/llm
        property: anthropic_api_key
    - secretKey: COHERE_API_KEY
      remoteRef:
        key: rag-p/llm
        property: cohere_api_key
    - secretKey: MINIMAX_API_KEY
      remoteRef:
        key: rag-p/llm
        property: minimax_api_key
{{- end }}
