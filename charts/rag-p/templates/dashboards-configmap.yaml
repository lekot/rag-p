{{- if .Values.observability.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "rag-p.fullname" . }}-dashboards
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "rag-p.labels" . | nindent 4 }}
    grafana_dashboard: "1"
data:
  rag-p-api.json: |
    {{ .Files.Get "dashboards/rag-p-api.json" | nindent 4 }}
  rag-p-worker.json: |
    {{ .Files.Get "dashboards/rag-p-worker.json" | nindent 4 }}
{{- end }}
