apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "rag-p.fullname" . }}-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "rag-p.componentLabels" (dict "root" . "component" "api") | nindent 4 }}
data:
  LOG_LEVEL: {{ .Values.api.env.LOG_LEVEL | quote }}
  {{- range $key, $value := .Values.api.env }}
  {{- if and (ne $key "LOG_LEVEL") (ne $key "DATABASE_URL") (ne $key "REDIS_URL") }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
  {{- end }}
