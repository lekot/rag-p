apiVersion: v1
kind: Pod
metadata:
  name: {{ include "rag-p.fullname" . }}-test-connection
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "rag-p.componentLabels" (dict "root" . "component" "test") | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: curl
      image: curlimages/curl:8.6.0
      command:
        - sh
        - -c
        - |
          echo "Testing API healthz..."
          curl -sf http://{{ include "rag-p.fullname" . }}-api:{{ .Values.api.service.port }}/healthz
          echo ""
          echo "API health check passed"
