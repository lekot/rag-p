{{- if .Values.postgres.enabled }}
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: {{ include "rag-p.fullname" . }}-postgres
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "rag-p.componentLabels" (dict "root" . "component" "postgres") | nindent 4 }}
spec:
  instances: {{ .Values.postgres.cnpg.instances }}
  imageName: {{ .Values.postgres.cnpg.imageName | default "ghcr.io/cloudnative-pg/postgresql:16.4" }}

  postgresql:
    parameters:
      max_connections: "200"
      shared_buffers: "256MB"

  bootstrap:
    initdb:
      database: {{ .Values.postgres.cnpg.databaseName }}
      owner: {{ .Values.postgres.cnpg.ownerName }}
      postInitSQL:
        - CREATE EXTENSION IF NOT EXISTS vector;
        - CREATE EXTENSION IF NOT EXISTS pg_trgm;

  storage:
    size: {{ .Values.postgres.cnpg.storage.size }}
    {{- if or .Values.postgres.cnpg.storage.storageClass .Values.global.storageClass }}
    storageClass: {{ .Values.postgres.cnpg.storage.storageClass | default .Values.global.storageClass }}
    {{- end }}

  {{- if .Values.postgres.cnpg.backup.enabled }}
  backup:
    barmanObjectStore:
      destinationPath: s3://{{ .Values.postgres.cnpg.backup.bucketName }}/cnpg
      endpointURL: {{ .Values.postgres.cnpg.backup.endpointURL }}
      s3Credentials:
        accessKeyId:
          name: cnpg-s3-credentials
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: cnpg-s3-credentials
          key: ACCESS_SECRET_KEY
      wal:
        compression: gzip
        maxParallel: 8
      data:
        compression: gzip
        jobs: 2
    retentionPolicy: {{ .Values.postgres.cnpg.backup.retentionPolicy | quote }}
  {{- end }}
{{- end }}
