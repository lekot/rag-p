{{- if .Values.langfuse.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "rag-p.fullname" . }}-langfuse
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "rag-p.componentLabels" (dict "root" . "component" "langfuse") | nindent 4 }}
spec:
  replicas: {{ .Values.langfuse.replicas }}
  selector:
    matchLabels:
      {{- include "rag-p.componentSelectorLabels" (dict "root" . "component" "langfuse") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "rag-p.componentLabels" (dict "root" . "component" "langfuse") | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/langfuse-configmap.yaml") . | sha256sum }}
    spec:
      containers:
        - name: langfuse
          image: {{ printf "%s:%s" .Values.langfuse.image.repository .Values.langfuse.image.tag }}
          imagePullPolicy: {{ .Values.langfuse.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "rag-p.fullname" . }}-langfuse
          env:
            - name: NEXTAUTH_URL
              value: "http://{{ .Values.langfuse.host }}"
            - name: NEXTAUTH_SECRET
              value: {{ .Values.langfuse.env.NEXTAUTH_SECRET | quote }}
            - name: SALT
              value: {{ .Values.langfuse.env.SALT | quote }}
            {{- if .Values.postgres.enabled }}
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgres.cnpg.secretName }}
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgres.cnpg.secretName }}
                  key: password
            - name: DATABASE_URL
              value: "postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@{{ include "rag-p.fullname" . }}-postgres-rw:5432/{{ .Values.postgres.cnpg.databaseName }}"
            {{- end }}
          livenessProbe:
            httpGet:
              path: /api/public/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /api/public/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 15
            failureThreshold: 3
          resources:
            {{- toYaml .Values.langfuse.resources | nindent 12 }}
{{- end }}
