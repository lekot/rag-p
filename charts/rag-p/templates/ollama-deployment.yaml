{{- if .Values.ollama.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "rag-p.fullname" . }}-ollama-models
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "rag-p.componentLabels" (dict "root" . "component" "ollama") | nindent 4 }}
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: {{ .Values.ollama.storage.size }}
  {{- if or .Values.ollama.storage.storageClass .Values.global.storageClass }}
  storageClassName: {{ .Values.ollama.storage.storageClass | default .Values.global.storageClass }}
  {{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "rag-p.fullname" . }}-ollama
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "rag-p.componentLabels" (dict "root" . "component" "ollama") | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "rag-p.componentSelectorLabels" (dict "root" . "component" "ollama") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "rag-p.componentLabels" (dict "root" . "component" "ollama") | nindent 8 }}
    spec:
      containers:
        - name: ollama
          image: {{ .Values.ollama.image }}
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 11434
              protocol: TCP
          env:
            - name: OLLAMA_HOST
              value: "0.0.0.0:11434"
            - name: OLLAMA_MODELS
              value: /root/.ollama/models
            - name: OLLAMA_KEEP_ALIVE
              value: "30m"
          volumeMounts:
            - name: models
              mountPath: /root/.ollama
          resources:
            {{- toYaml .Values.ollama.resources | nindent 12 }}
          startupProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 10
          lifecycle:
            postStart:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - |
                    # Pull the embedding model in background once Ollama is ready.
                    (until curl -sf http://127.0.0.1:11434/ >/dev/null 2>&1; do sleep 2; done; \
                     ollama pull {{ .Values.ollama.model }} 2>&1 | tee -a /tmp/pull.log) &
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: {{ include "rag-p.fullname" . }}-ollama-models
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "rag-p.fullname" . }}-ollama
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "rag-p.componentLabels" (dict "root" . "component" "ollama") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 11434
      targetPort: http
  selector:
    {{- include "rag-p.componentSelectorLabels" (dict "root" . "component" "ollama") | nindent 4 }}
{{- end }}
