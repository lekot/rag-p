{{- if .Values.tls.enabled }}
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: {{ .Values.tls.issuerName }}
  labels:
    {{- include "rag-p.labels" . | nindent 4 }}
spec:
  acme:
    server: {{ .Values.tls.acmeServer }}
    email: {{ .Values.tls.email }}
    privateKeySecretRef:
      name: {{ .Values.tls.issuerName }}-account-key
    solvers:
      - http01:
          ingress:
            class: {{ .Values.tls.ingressClass }}
{{- end }}
