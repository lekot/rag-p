{{- if .Values.litellm.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "rag-p.fullname" . }}-litellm
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "rag-p.componentLabels" (dict "root" . "component" "litellm") | nindent 4 }}
spec:
  replicas: {{ .Values.litellm.replicas }}
  selector:
    matchLabels:
      {{- include "rag-p.componentSelectorLabels" (dict "root" . "component" "litellm") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "rag-p.componentLabels" (dict "root" . "component" "litellm") | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/litellm-configmap.yaml") . | sha256sum }}
    spec:
      containers:
        - name: litellm
          image: {{ printf "%s:%s" .Values.litellm.image.repository .Values.litellm.image.tag }}
          imagePullPolicy: {{ .Values.litellm.image.pullPolicy }}
          args:
            - --config
            - /app/config.yaml
          ports:
            - name: http
              containerPort: {{ .Values.litellm.service.port }}
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /app/config.yaml
              subPath: config.yaml
          env:
            - name: LITELLM_MASTER_KEY
              value: {{ .Values.litellm.env.LITELLM_MASTER_KEY | quote }}
            {{- range $key, $value := .Values.litellm.env }}
            {{- if ne $key "LITELLM_MASTER_KEY" }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /health/liveliness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /health/readiness
              port: http
            initialDelaySeconds: 15
            periodSeconds: 15
            failureThreshold: 3
          resources:
            {{- toYaml .Values.litellm.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "rag-p.fullname" . }}-litellm
{{- end }}
