{{- if .Values.permify.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "rag-p.fullname" . }}-permify
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "rag-p.componentLabels" (dict "root" . "component" "permify") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.permify.service.port }}
      targetPort: http
      protocol: TCP
      name: http
    - port: {{ .Values.permify.service.grpcPort }}
      targetPort: grpc
      protocol: TCP
      name: grpc
  selector:
    {{- include "rag-p.componentSelectorLabels" (dict "root" . "component" "permify") | nindent 4 }}
{{- end }}
