{{- if .Values.vault.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "rag-p.fullname" . }}-eso-sa
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "rag-p.labels" . | nindent 4 }}
  annotations:
    # This ServiceAccount is used by ESO to authenticate against Vault via Kubernetes auth method.
    # The corresponding Vault role (rag-p-secrets) must be configured manually — see docs/vault-eso-setup.md
    vault.hashicorp.com/role: "rag-p-secrets"
{{- end }}
