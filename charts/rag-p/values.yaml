# Global settings
global:
  imageRegistry: "ghcr.io/lekot"
  storageClass: ""

# API service (FastAPI)
api:
  image:
    repository: rag-p-api
    tag: "latest"
    pullPolicy: IfNotPresent
  replicas: 2
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  service:
    port: 8000
  ingress:
    enabled: true
    className: traefik
    host: api.rag-p.local
    tls: false
    annotations: {}
  env:
    LOG_LEVEL: info
    DATABASE_URL: ""
    REDIS_URL: ""
    MINIO_ENDPOINT: ""
  # RAGP_SESSION_SECRET injected via Secret `<release>-api-secrets` (key: sessionSecret).
  # Create it manually before first install:
  #   kubectl -n <ns> create secret generic <release>-api-secrets \
  #     --from-literal=sessionSecret=$(python -c 'import secrets; print(secrets.token_urlsafe(48))')
  # The Secret is NOT managed by Helm — preserves session validity across upgrades.
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 10
    targetCPU: 70

# Web frontend (Next.js)
web:
  image:
    repository: rag-p-web
    tag: "latest"
    pullPolicy: IfNotPresent
  replicas: 2
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  service:
    port: 3000
  ingress:
    enabled: true
    className: traefik
    host: rag-p.local
    tls: false
    annotations: {}
  env:
    NEXT_PUBLIC_API_URL: "http://api.rag-p.local"

# Background worker (same image as api)
worker:
  enabled: true
  replicas: 1
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  env: {}

# PostgreSQL via CloudNativePG operator (cluster-wide operator required)
postgres:
  enabled: true
  cnpg:
    instances: 1
    storage:
      size: 10Gi
      storageClass: ""
    extensions:
      - vector
      - pg_trgm
    databaseName: ragp
    ownerName: ragp
    secretName: postgres-app-secret
    backup:
      enabled: false
      bucketName: ""
      endpointURL: "https://s3.ru-1.storage.selcloud.ru"
      retentionPolicy: "30d"
      schedule: "0 2 * * *"

# Redis via Bitnami chart
redis:
  enabled: true
  auth:
    enabled: true
    existingSecret: ""
    password: "changeme"
  master:
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi
  replica:
    replicaCount: 0

# Langfuse LLM observability
langfuse:
  enabled: true
  host: langfuse.rag-p.local
  image:
    repository: ghcr.io/langfuse/langfuse
    tag: "2"
    pullPolicy: IfNotPresent
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  ingress:
    enabled: true
    className: traefik
    tls: false
    annotations: {}
  env:
    NEXTAUTH_SECRET: "changeme-in-prod"
    SALT: "changeme-in-prod"
    TELEMETRY_ENABLED: "false"
    NEXT_PUBLIC_SIGN_UP_DISABLED: "false"

# Permify authorization service (cluster-wide operator; ClusterIP only)
permify:
  enabled: true
  internal: true
  image:
    repository: ghcr.io/permify/permify
    tag: "latest"
    pullPolicy: IfNotPresent
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  service:
    port: 3476
    grpcPort: 3478
  env: {}

# MinIO object storage via Bitnami chart
minio:
  enabled: true
  auth:
    rootUser: minio
    rootPassword: "changeme"
  defaultBuckets: "documents,processed"
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# LiteLLM proxy (optional)
litellm:
  enabled: true
  image:
    repository: ghcr.io/berriai/litellm
    tag: "main-stable"
    pullPolicy: IfNotPresent
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  service:
    port: 4000
  config:
    model_list: []
  env:
    LITELLM_MASTER_KEY: "changeme"

# HashiCorp Vault (deployed as sub-chart; disabled by default)
# Initial unseal + auth configuration is a manual one-time procedure — see docs/vault-eso-setup.md
vault:
  enabled: false
  server:
    dev:
      enabled: false
    standalone:
      enabled: true
      config: |
        ui = true
        listener "tcp" {
          tls_disable = 1
          address = "[::]:8200"
          cluster_address = "[::]:8201"
        }
        storage "file" {
          path = "/vault/data"
        }
    dataStorage:
      enabled: true
      size: 5Gi
      storageClass: fast.ru-3b
  injector:
    enabled: false  # ESO is preferred over sidecar-injector for this use-case
  # ExternalSecret resources are created per-secret when vault.enabled=true and the flag below is true.
  # Each flag is independent — enables gradual migration from manual kubectl secrets.
  externalSecrets:
    llmKeys: false   # creates ExternalSecret for llmKeysSecret (rag-p/llm)
    s3: false        # creates ExternalSecret for cnpg-s3-credentials (rag-p/s3)
    session: false   # creates ExternalSecret for api-secrets sessionSecret (rag-p/session)

# External Secrets Operator integration (cluster-wide operator required)
externalSecrets:
  enabled: false
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore

# NetworkPolicy (default deny + per-service allow)
networkPolicy:
  enabled: false
  cilium:
    enabled: false

# Let's Encrypt ClusterIssuer for cert-manager (created if tls.enabled)
# Name of k8s Secret holding LLM API keys (OPENAI_API_KEY, COHERE_API_KEY,
# ANTHROPIC_API_KEY, MINIMAX_API_KEY). Mounted into api/worker via envFrom.
llmKeysSecret: ""

# Name of k8s Secret holding YooKassa credentials
# (RAGP_YOOKASSA_SHOP_ID, RAGP_YOOKASSA_SECRET_KEY, RAGP_YOOKASSA_INN, RAGP_YOOKASSA_WEBHOOK_SECRET).
# Pod starts even if this secret is absent (optional: true).
yookassaSecretName: "yookassa-credentials"

# Self-hosted embedding service. Pulls model on first start and caches in PVC.
ollama:
  enabled: false
  image: ollama/ollama:0.4.7
  model: bge-m3
  storage:
    size: 5Gi
    storageClass: ""
  resources:
    requests:
      cpu: 100m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 2Gi

tls:
  enabled: false
  issuerName: letsencrypt-prod
  acmeServer: https://acme-v02.api.letsencrypt.org/directory
  email: ""
  ingressClass: traefik

# Observability stack (prod only)
observability:
  enabled: false
  serviceMonitor:
    enabled: true
  workerMetricsPort: 9090
  prometheus:
    enabled: false
  grafana:
    enabled: false
  loki:
    enabled: false

# kube-prometheus-stack sub-chart config (active only when observability.prometheus.enabled=true)
kube-prometheus-stack:
  grafana:
    sidecar:
      dashboards:
        enabled: true
        label: grafana_dashboard
        labelValue: "1"
        searchNamespace: ALL
    dashboardProviders:
      dashboardproviders.yaml:
        apiVersion: 1
        providers:
          - name: rag-p
            orgId: 1
            folder: "RAG Platform"
            type: file
            disableDeletion: false
            editable: true
            options:
              path: /tmp/dashboards/rag-p

# loki-stack sub-chart config (active only when observability.loki.enabled=true)
loki-stack:
  loki:
    enabled: true
    persistence:
      enabled: false
      size: 10Gi
  promtail:
    enabled: true
