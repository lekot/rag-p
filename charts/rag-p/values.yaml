# Global settings
global:
  imageRegistry: "ghcr.io/lekot"
  storageClass: ""

# API service (FastAPI)
api:
  image:
    repository: rag-p-api
    tag: "latest"
    pullPolicy: IfNotPresent
  replicas: 2
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  service:
    port: 8000
  ingress:
    enabled: true
    className: traefik
    host: api.rag-p.local
    tls: false
    annotations: {}
  env:
    LOG_LEVEL: info
    DATABASE_URL: ""
    REDIS_URL: ""
    MINIO_ENDPOINT: ""
  apiSecrets:
    # RAGP_SESSION_SECRET — secret for signing session cookies.
    # Override in values.staging.yaml / values.prod.yaml via a proper k8s Secret.
    sessionSecret: "dev-only-not-secret-change-in-prod"
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 10
    targetCPU: 70

# Web frontend (Next.js)
web:
  image:
    repository: rag-p-web
    tag: "latest"
    pullPolicy: IfNotPresent
  replicas: 2
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  service:
    port: 3000
  ingress:
    enabled: true
    className: traefik
    host: rag-p.local
    tls: false
    annotations: {}
  env:
    NEXT_PUBLIC_API_URL: "http://api.rag-p.local"

# Background worker (same image as api)
worker:
  enabled: true
  replicas: 1
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  env: {}

# PostgreSQL via CloudNativePG operator (cluster-wide operator required)
postgres:
  enabled: true
  cnpg:
    instances: 1
    storage:
      size: 10Gi
      storageClass: ""
    extensions:
      - vector
      - pg_trgm
    databaseName: ragp
    ownerName: ragp
    secretName: postgres-app-secret

# Redis via Bitnami chart
redis:
  enabled: true
  auth:
    enabled: true
    existingSecret: ""
    password: "changeme"
  master:
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi
  replica:
    replicaCount: 0

# Langfuse LLM observability
langfuse:
  enabled: true
  host: langfuse.rag-p.local
  image:
    repository: ghcr.io/langfuse/langfuse
    tag: "2"
    pullPolicy: IfNotPresent
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  ingress:
    enabled: true
    className: traefik
    tls: false
    annotations: {}
  env:
    NEXTAUTH_SECRET: "changeme-in-prod"
    SALT: "changeme-in-prod"
    TELEMETRY_ENABLED: "false"
    NEXT_PUBLIC_SIGN_UP_DISABLED: "false"

# Permify authorization service (cluster-wide operator; ClusterIP only)
permify:
  enabled: true
  internal: true
  image:
    repository: ghcr.io/permify/permify
    tag: "latest"
    pullPolicy: IfNotPresent
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  service:
    port: 3476
    grpcPort: 3478
  env: {}

# MinIO object storage via Bitnami chart
minio:
  enabled: true
  auth:
    rootUser: minio
    rootPassword: "changeme"
  defaultBuckets: "documents,processed"
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# LiteLLM proxy (optional)
litellm:
  enabled: true
  image:
    repository: ghcr.io/berriai/litellm
    tag: "main-stable"
    pullPolicy: IfNotPresent
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  service:
    port: 4000
  config:
    model_list: []
  env:
    LITELLM_MASTER_KEY: "changeme"

# External Secrets Operator integration (cluster-wide operator required)
externalSecrets:
  enabled: false
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore

# NetworkPolicy (default deny + per-service allow)
networkPolicy:
  enabled: false
  cilium:
    enabled: false

# Let's Encrypt ClusterIssuer for cert-manager (created if tls.enabled)
# Name of k8s Secret holding LLM API keys (OPENAI_API_KEY, COHERE_API_KEY,
# ANTHROPIC_API_KEY, MINIMAX_API_KEY). Mounted into api/worker via envFrom.
llmKeysSecret: ""

# Self-hosted embedding service. Pulls model on first start and caches in PVC.
ollama:
  enabled: false
  image: ollama/ollama:0.4.7
  model: bge-m3
  storage:
    size: 5Gi
    storageClass: ""
  resources:
    requests:
      cpu: 100m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 2Gi

tls:
  enabled: false
  issuerName: letsencrypt-prod
  acmeServer: https://acme-v02.api.letsencrypt.org/directory
  email: ""
  ingressClass: traefik

# Observability stack (prod only)
observability:
  enabled: false
  prometheus:
    enabled: false
  grafana:
    enabled: false
  loki:
    enabled: false
