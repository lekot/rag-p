# Selectel managed k8s staging — 1 node 2 vCPU / 8 GB RAM / 40 GB local SSD.
# Single-instance pilot, no HA, http only via *.139-100-200-55.nip.io.

global:
  imageRegistry: ""
  storageClass: "fast.ru-3b"
  imagePullSecrets:
    - name: ghcr-pull

api:
  image:
    registry: "ghcr.io/lekot"
    tag: "0.1.1"
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 800m
      memory: 768Mi
  ingress:
    enabled: true
    className: traefik
    host: api.139-100-200-55.nip.io
    tls: false

web:
  image:
    registry: "ghcr.io/lekot"
    tag: "0.1.1"
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 192Mi
    limits:
      cpu: 500m
      memory: 512Mi
  ingress:
    enabled: true
    className: traefik
    host: 139-100-200-55.nip.io
    tls: false
  env:
    NEXT_PUBLIC_API_URL: "http://api.139-100-200-55.nip.io"

worker:
  enabled: false

postgres:
  enabled: true
  cnpg:
    instances: 1
    secretName: "rag-p-postgres-app"
    databaseName: "ragp"
    ownerName: "ragp"
    storage:
      size: 10Gi
      storageClass: "fast.ru-3b"

redis:
  enabled: true
  auth:
    enabled: false
  master:
    persistence:
      enabled: false
  architecture: standalone

langfuse:
  enabled: false

permify:
  enabled: false

minio:
  enabled: false

litellm:
  enabled: false

externalSecrets:
  enabled: false

networkPolicy:
  enabled: false

observability:
  enabled: false
