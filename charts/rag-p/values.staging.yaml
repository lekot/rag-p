# Selectel managed k8s staging — 1 node 2 vCPU / 8 GB RAM / 40 GB local SSD.
# Single-instance pilot, no HA, http only via *.139-100-200-55.nip.io.

global:
  imageRegistry: "ghcr.io/lekot"
  storageClass: "fast.ru-3b"
  imagePullSecrets:
    - name: ghcr-pull

api:
  image:
    tag: "0.1.0"
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 800m
      memory: 768Mi
  ingress:
    enabled: true
    className: traefik
    host: api.139-100-200-55.nip.io
    tls: false

web:
  image:
    tag: "0.1.0"
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 192Mi
    limits:
      cpu: 500m
      memory: 512Mi
  ingress:
    enabled: true
    className: traefik
    host: 139-100-200-55.nip.io
    tls: false
  env:
    NEXT_PUBLIC_API_URL: "http://api.139-100-200-55.nip.io"

worker:
  enabled: true
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

postgres:
  enabled: true
  cnpg:
    instances: 1
    storage:
      size: 10Gi
      storageClass: "fast.ru-3b"

redis:
  enabled: true
  auth:
    enabled: false
  master:
    persistence:
      enabled: false
  architecture: standalone

langfuse:
  enabled: true
  ingress:
    enabled: true
    className: traefik
    host: langfuse.139-100-200-55.nip.io
    tls: false

permify:
  enabled: true

minio:
  enabled: true
  mode: standalone
  persistence:
    enabled: true
    size: 5Gi
    storageClass: "fast.ru-3b"
  auth:
    rootUser: minio
    rootPassword: changeme-staging-only
  resources:
    requests:
      cpu: 50m
      memory: 256Mi

litellm:
  enabled: true
  config:
    model_list: []

externalSecrets:
  enabled: false

networkPolicy:
  enabled: false

observability:
  enabled: false
