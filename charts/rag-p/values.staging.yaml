# Selectel managed k8s staging — 1 node 2 vCPU / 8 GB RAM / 40 GB local SSD.
# Single-instance pilot, https via lekottt.ru / api.lekottt.ru.

llmKeysSecret: "llm-keys"

ollama:
  enabled: true
  image: ollama/ollama:0.4.7
  model: bge-m3
  storage:
    size: 10Gi
    storageClass: "fast.ru-3b"
  resources:
    requests:
      cpu: 100m
      memory: 1Gi
    limits:
      cpu: 1500m
      memory: 2Gi

tls:
  enabled: true
  issuerName: letsencrypt-prod
  acmeServer: https://acme-v02.api.letsencrypt.org/directory
  email: papanifontov@gmail.com
  ingressClass: traefik

global:
  imageRegistry: ""
  storageClass: "fast.ru-3b"
  imagePullSecrets:
    - name: ghcr-pull

api:
  image:
    registry: "ghcr.io/lekot"
    tag: "0.1.19"
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 800m
      memory: 768Mi
  ingress:
    enabled: true
    className: traefik
    host: api.lekottt.ru
    tls: true
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod

web:
  image:
    registry: "ghcr.io/lekot"
    tag: "0.1.19"
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 192Mi
    limits:
      cpu: 500m
      memory: 512Mi
  ingress:
    enabled: true
    className: traefik
    host: lekottt.ru
    tls: true
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
  env:
    NEXT_PUBLIC_API_URL: "https://api.lekottt.ru"

worker:
  enabled: true
  replicas: 1

postgres:
  enabled: true
  cnpg:
    instances: 1
    secretName: "rag-p-postgres-app"
    databaseName: "ragp"
    ownerName: "ragp"
    storage:
      size: 10Gi
      storageClass: "fast.ru-3b"
    backup:
      enabled: true
      bucketName: "rag-p-backups-staging"

redis:
  enabled: true
  auth:
    enabled: false
  master:
    persistence:
      enabled: false
  architecture: standalone

langfuse:
  enabled: false

permify:
  enabled: false

minio:
  enabled: false

litellm:
  enabled: false

networkPolicy:
  enabled: false

observability:
  enabled: true
  serviceMonitor:
    # CRDs ставит CD-пайплайн (deploy-staging.yml → step "Install/upgrade cluster prerequisites").
    enabled: true
  workerMetricsPort: 9090
  prometheus:
    enabled: false  # kube-prometheus-stack установлен на кластере отдельно
  loki:
    enabled: true
  grafana:
    enabled: false  # grafana входит в kube-prometheus-stack

loki-stack:
  loki:
    enabled: true
    persistence:
      enabled: true
      size: 10Gi
      storageClass: "fast.ru-3b"
  promtail:
    enabled: true
