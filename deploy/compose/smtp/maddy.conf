# Maddy — sender-only relay for transactional email (password reset, billing).
#
# Role: accept plaintext SMTP on the internal docker network (no auth, no TLS),
# sign outgoing mail with DKIM, deliver to remote MXes via port 25.  Inbound
# SMTP (port 25) and IMAP are NOT enabled — this server only sends.
#
# Trust model: the tcp://0.0.0.0:587 listener is exposed only on the compose
# `internal` network.  Anyone who can reach it (api / worker containers) is
# already trusted.  External clients cannot reach this port — there is no
# host-port publish, and the firewall doesn't expose 587.
#
# DKIM keys live in /data/dkim_keys/<domain>_<selector>.{key,dns}.  After the
# first delivery the .dns file holds the TXT record value to paste into DNS.

# ----------------------------------------------------------------------------
# Base variables — overridden per environment via $MADDY_HOSTNAME / $MADDY_DOMAIN.

$(hostname) = {env:MADDY_HOSTNAME}
$(primary_domain) = {env:MADDY_DOMAIN}
$(local_domains) = $(primary_domain)

hostname $(hostname)

# No TLS certs needed for the internal listener — all traffic stays inside the
# docker bridge network.  Outbound delivery to remote MXes uses opportunistic
# STARTTLS (encrypted) per `local_policy` below.
tls off

# ----------------------------------------------------------------------------
# Submission endpoint on the internal network.
#
# Plain `smtp` (not `submission`): no TLS, no auth.  Source domain is locked
# down to $(local_domains) so the relay can only be used to send `From:
# *@lekottt.ru`.  Anything else is rejected to avoid accidental open-relay.

smtp tcp://0.0.0.0:587 {
    limits {
        all rate 50 1s
        all concurrency 20
    }

    source $(local_domains) {
        default_destination {
            modify {
                dkim $(primary_domain) $(local_domains) default
            }
            deliver_to &remote_queue
        }
    }
    default_source {
        reject 501 5.1.8 "Non-local sender domain — relay refused"
    }
}

# ----------------------------------------------------------------------------
# Outbound delivery to remote MXes (port 25 egress to the internet).

target.remote outbound_delivery {
    limits {
        destination rate 20 1s
        destination concurrency 10
    }
    mx_auth {
        dane
        mtasts {
            cache fs
            fs_dir mtasts_cache/
        }
        local_policy {
            min_tls_level encrypted
            min_mx_level none
        }
    }
}

# ----------------------------------------------------------------------------
# Durable queue with bounce handling.  max_tries=4d ≈ 4 days of retry, matching
# typical SMTP relay defaults.  Bounces (DSNs) are dropped — there is no local
# mailbox to deliver them to in a sender-only setup.

target.queue remote_queue {
    target &outbound_delivery

    autogenerated_msg_domain $(primary_domain)
    max_tries 16

    bounce {
        default_destination {
            reject 550 5.0.0 "Sender-only relay — bounces are not stored"
        }
    }
}
