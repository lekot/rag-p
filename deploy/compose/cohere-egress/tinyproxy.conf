# tinyproxy config for the cohere-egress sidecar.
#
# Listens on the docker bridge interface and forwards CONNECT requests
# upstream. With the AmneziaWG client up, all outbound TCP travels through
# wg0 — the iptables MARK / ip rule trick in entrypoint.sh keeps the return
# path on eth0 so docker peers can still talk to us on :8888.

User tinyproxy
Group tinyproxy

Port 8888
Listen 0.0.0.0
BindSame no
Timeout 60

DefaultErrorFile "/usr/share/tinyproxy/default.html"
StatFile "/usr/share/tinyproxy/stats.html"

LogLevel Connect

MaxClients 100
MinSpareServers 2
MaxSpareServers 8
StartServers 4
MaxRequestsPerChild 0

# Allow only the docker bridge networks. Compose creates project networks in
# the 172.16.0.0/12 range; we accept the entire range so we don't have to
# hardcode the project subnet.
Allow 127.0.0.0/8
Allow 10.0.0.0/8
Allow 172.16.0.0/12
Allow 192.168.0.0/16

# Restrict CONNECT to TLS — cohere SDK only ever talks to https://.
ConnectPort 443

ViaProxyName "cohere-egress"
DisableViaHeader Yes
