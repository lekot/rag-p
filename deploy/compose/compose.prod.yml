name: rag-p

services:
  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    env_file:
      - ./.env
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - public
      - internal

  web:
    image: ${RAGP_WEB_IMAGE:-ghcr.io/lekot/rag-p-web:staging-latest}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.lekottt.ru}
      # Server-side Next.js route handlers must reach the API via the docker
      # service network — fetching api.lekottt.ru from inside the bridge
      # ECONNREFUSEs back at Caddy.  Public URL stays for the browser.
      API_URL_INTERNAL: http://api:8000
      PORT: 3000
      HOSTNAME: 0.0.0.0
    depends_on:
      api:
        condition: service_healthy
    expose:
      - "3000"
    networks:
      - internal

  api:
    image: ${RAGP_API_IMAGE:-ghcr.io/lekot/rag-p-api:staging-latest}
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      RAGP_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      RAGP_REDIS_HOST: redis
      RAGP_REDIS_PORT: 6379
      REDIS_URL: redis://redis:6379/0
      OLLAMA_HOST: http://ollama:11434
      RAGP_SESSION_COOKIE_SECURE: "true"
      RAGP_ALLOW_LEGACY_ORG_HEADER: "false"
      RAGP_COHERE_HTTP_PROXY: ${RAGP_COHERE_HTTP_PROXY:-http://cohere-egress:8888}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
      cohere-egress:
        condition: service_healthy
      smtp:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=5).read()",
        ]
      interval: 20s
      timeout: 10s
      retries: 6
      start_period: 30s
    expose:
      - "8000"
    networks:
      - internal

  worker-experiment:
    image: ${RAGP_API_IMAGE:-ghcr.io/lekot/rag-p-api:staging-latest}
    restart: unless-stopped
    command: ["arq", "ragp_api.workers.main.WorkerExperimentSettings"]
    env_file:
      - ./.env
    environment:
      RAGP_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      RAGP_REDIS_HOST: redis
      RAGP_REDIS_PORT: 6379
      REDIS_URL: redis://redis:6379/0
      OLLAMA_HOST: http://ollama:11434
      RAGP_COHERE_HTTP_PROXY: ${RAGP_COHERE_HTTP_PROXY:-http://cohere-egress:8888}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
      cohere-egress:
        condition: service_healthy
    expose:
      - "9090"
    networks:
      - internal

  # worker-ingest is intentionally not started — there are no async ingest
  # tasks registered yet (run_dataset_ingest_task does not exist).  ARQ
  # refuses to start a worker with an empty functions list:
  #     RuntimeError: at least one function or cron_job must be registered
  # Re-enable this service once an ingest task function lands.

  worker-maintenance:
    image: ${RAGP_API_IMAGE:-ghcr.io/lekot/rag-p-api:staging-latest}
    restart: unless-stopped
    command: ["arq", "ragp_api.workers.main.WorkerMaintenanceSettings"]
    env_file:
      - ./.env
    environment:
      RAGP_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      RAGP_REDIS_HOST: redis
      RAGP_REDIS_PORT: 6379
      REDIS_URL: redis://redis:6379/0
      OLLAMA_HOST: http://ollama:11434
      RAGP_COHERE_HTTP_PROXY: ${RAGP_COHERE_HTTP_PROXY:-http://cohere-egress:8888}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
      cohere-egress:
        condition: service_healthy
      smtp:
        condition: service_healthy
    networks:
      - internal

  migrate:
    image: ${RAGP_API_IMAGE:-ghcr.io/lekot/rag-p-api:staging-latest}
    profiles:
      - tools
    command: ["alembic", "-c", "/app/alembic.ini", "upgrade", "head"]
    env_file:
      - ./.env
    environment:
      RAGP_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal

  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 10
    expose:
      - "5432"
    networks:
      - internal

  postgres-backup:
    build:
      context: ./postgres-backup
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      # Proxy for S3 connectivity: if `aws s3 ls` against the target bucket
      # works, credentials and endpoint are still valid.
      test:
        [
          "CMD-SHELL",
          "AWS_ACCESS_KEY_ID=$$RAGP_PGBACKUP_S3_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY=$$RAGP_PGBACKUP_S3_SECRET_ACCESS_KEY aws --endpoint-url $$RAGP_PGBACKUP_S3_ENDPOINT_URL s3 ls s3://$$RAGP_PGBACKUP_S3_BUCKET >/dev/null",
        ]
      interval: 5m
      timeout: 30s
      retries: 3
      start_period: 30s
    networks:
      - internal

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    expose:
      - "6379"
    networks:
      - internal

  ollama:
    image: ollama/ollama:0.4.7
    restart: unless-stopped
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
      OLLAMA_MODELS: /root/.ollama/models
      OLLAMA_KEEP_ALIVE: 30m
      OLLAMA_MODEL: ${OLLAMA_MODEL:-bge-m3}
    volumes:
      - ollama_models:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 10s
    expose:
      - "11434"
    networks:
      - internal

  # Selective-egress sidecar: AmneziaWG VPN client + tinyproxy on :8888.
  # Only cohere SDK calls (reranker + embedder) go through this proxy via
  # RAGP_COHERE_HTTP_PROXY; everything else stays direct. The VPN config
  # itself is materialised by CD onto the host as cohere.amnezia.conf and
  # mounted read-only — if the file is absent the sidecar still starts
  # tinyproxy (without VPN) so compose health does not block the rest of
  # the stack.
  cohere-egress:
    build:
      context: ./cohere-egress
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    sysctls:
      net.ipv4.conf.all.src_valid_mark: 1
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - /opt/rag-p/cohere.amnezia.conf:/etc/amneziawg/awg0.conf:ro
    expose:
      - "8888"
    healthcheck:
      # Probe the local tinyproxy listener — VPN may legitimately be down
      # during transient handshake retries, so we don't gate health on it.
      test: ["CMD-SHELL", "curl -fsS -o /dev/null -m 3 http://127.0.0.1:8888 || test $? -eq 22"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - internal

  # Self-hosted SMTP relay (maddy) for transactional email — password reset,
  # billing notifications.  Sender-only role: accepts plaintext SMTP from the
  # internal docker network (no auth, no TLS), signs with DKIM, delivers to
  # remote MXes via port 25 egress.  No host port is published — only the
  # `internal` network can reach :587.
  #
  # First boot generates a DKIM keypair under /data/dkim_keys/.  After deploy,
  # read the public key for DNS with:
  #     docker exec rag-p-smtp-1 cat /data/dkim_keys/lekottt.ru_default.dns
  # and paste the value as a TXT record at default._domainkey.lekottt.ru.
  #
  # Outbound port 25 must be unblocked at the hosting provider (Selectel often
  # blocks it by default — file a ticket if delivery hangs in queue).
  smtp:
    image: foxcpp/maddy:latest
    restart: unless-stopped
    environment:
      MADDY_HOSTNAME: mail.lekottt.ru
      MADDY_DOMAIN: lekottt.ru
    volumes:
      - smtp_data:/data
      - ./smtp/maddy.conf:/data/maddy.conf:ro
    healthcheck:
      # `maddy` image ships busybox `nc`; -z exits 0 once the listener is up.
      test: ["CMD-SHELL", "nc -z localhost 587"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    expose:
      - "587"
    networks:
      - internal

networks:
  public:
  internal:

volumes:
  caddy_data:
  caddy_config:
  postgres_data:
  ollama_models:
  smtp_data:
